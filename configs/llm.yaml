llm:
  provider: local
  base_url: "http://${RUNPOD_POD_IP}:8090/v1"
  model: "gemma4:latest"
  api_key: "not-needed"
  context_length: 65536
  temperature: 0.1
  timeout: 120
  session_ttl_days: 30
  fallback:
    enabled: false
  availability_check:
    enabled: true
    on_unavailable: "warn_and_continue_without_llm"
