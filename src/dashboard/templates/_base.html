<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block title %}Hunter 2{% endblock %}</title>
<style>
  body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
         background: #0d1117; color: #c9d1d9; margin: 0; padding: 0; }
  header { background: #161b22; padding: 12px 24px; border-bottom: 1px solid #30363d; }
  header a { color: #58a6ff; margin-right: 16px; text-decoration: none; }
  header a:hover { text-decoration: underline; }
  main { padding: 16px 24px; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { padding: 6px 10px; text-align: left; border-bottom: 1px solid #21262d; vertical-align: top; }
  th { color: #8b949e; font-weight: 600; }
  tr:hover { background: #161b22; }
  .status-done { color: #3fb950; }
  .status-failed { color: #f85149; }
  .status-blocked_oos { color: #d29922; }
  .status-running { color: #58a6ff; }
  select, input { background: #0d1117; color: #c9d1d9; border: 1px solid #30363d;
                  padding: 4px 8px; font-family: inherit; }
  .pill { display: inline-block; padding: 2px 6px; border-radius: 3px;
          background: #21262d; font-size: 11px; }
  h1, h2 { color: #f0f6fc; margin-top: 0; }
  code { background: #161b22; padding: 1px 4px; border-radius: 2px; }
</style>
</head>
<body>
<header>
  <strong>Hunter 2</strong> &nbsp;
  <a href="/">overview</a>
  <a href="/timeline">timeline</a>
  <a href="/programs">programs</a>
  <a href="/oos-assets">OOS assets</a>
</header>
<main>{% block content %}{% endblock %}</main>
</body>
</html>
